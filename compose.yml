services:
  php-apache:
    build: .
    container_name: php-apache-3
    ports:
      - "8080:80"
    user: "1000:1000"
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql-3
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
